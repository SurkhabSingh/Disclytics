version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: discord_analytics
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d discord_analytics"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: infra/docker/node-workspace.Dockerfile
    command: npm run start:api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/api/.env
    environment:
      BOT_CONTROL_URL: http://bot:4100
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/discord_analytics
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: infra/docker/node-workspace.Dockerfile
    command: npm run start:worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/worker/.env
    environment:
      BOT_CONTROL_URL: http://bot:4100
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/discord_analytics

  bot:
    build:
      context: .
      dockerfile: infra/docker/node-workspace.Dockerfile
    command: npm run start:bot
    depends_on:
      api:
        condition: service_started
    env_file:
      - apps/bot/.env
    environment:
      BACKEND_BASE_URL: http://api:4000
    ports:
      - "4100:4100"

  web:
    build:
      context: .
      dockerfile: infra/docker/node-workspace.Dockerfile
    command: npm run dev:web -- --host 0.0.0.0 --port 5173
    depends_on:
      api:
        condition: service_started
    env_file:
      - apps/web/.env
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"

volumes:
  postgres-data:
